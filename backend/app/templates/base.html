<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}게시판{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="/board" class="logo">돈만이 게시판</a>
      <nav class="nav">
        {% if current_user %}
          <span class="welcome">{{ current_user.username }}님</span>
          <form action="/logout" method="post" class="inline-form">
            <button type="submit" class="btn btn-secondary">로그아웃</button>
          </form>
        {% else %}
          <a href="/login" class="btn btn-secondary">로그인</a>
          <a href="/register" class="btn btn-primary">회원가입</a>
        {% endif %}
      </nav>
    </div>
  </header>

  <main class="container main">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="container">
      <p>FastAPI + PostgreSQL + Docker</p>
    </div>
  </footer>
</body>
</html>
