{% extends "base.html" %}

{% block title %}회원가입{% endblock %}

{% block content %}
<section class="auth-card">
  <h1>회원가입</h1>

  {% if error %}
    <div class="alert alert-error">{{ error }}</div>
  {% endif %}

  <form method="post" class="form">
    <label for="username">아이디</label>
    <input type="text" id="username" name="username" value="{{ username or '' }}" minlength="3" required>

    <label for="email">이메일</label>
    <input type="email" id="email" name="email" value="{{ email or '' }}" required>

    <label for="password">비밀번호</label>
    <input type="password" id="password" name="password" minlength="6" required>

    <label for="password_confirm">비밀번호 확인</label>
    <input type="password" id="password_confirm" name="password_confirm" minlength="6" required>

    <button type="submit" class="btn btn-primary btn-block">가입하기</button>
  </form>

  <p class="auth-link">이미 계정이 있으신가요? <a href="/login">로그인</a></p>
</section>
{% endblock %}
