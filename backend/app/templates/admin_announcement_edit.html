{% extends "base.html" %}

{% block title %}공지 수정 - {{ site_name }}{% endblock %}

{% block content %}
<section class="page-header">
  <div>
    <h1>공지 수정</h1>
    <p class="page-subtitle">등록된 공지 내용을 수정합니다.</p>
  </div>
  <a href="/admin/content" class="btn btn-secondary">목록으로</a>
</section>

<section class="admin-section">
  <form method="post" action="/admin/announcements/{{ announcement.id }}/edit" class="form">
    <label for="announcement-title">제목</label>
    <input
      type="text"
      id="announcement-title"
      name="title"
      maxlength="200"
      required
      value="{{ announcement.title }}"
    >

    <label for="announcement-content">내용</label>
    <textarea id="announcement-content" name="content" rows="8" required>{{ announcement.content }}</textarea>

    <label class="checkbox-row">
      <input type="checkbox" name="is_pinned" value="1" {% if announcement.is_pinned %}checked{% endif %}>
      상단 고정
    </label>

    <div class="form-actions">
      <a href="/admin/content" class="btn btn-secondary">취소</a>
      <button type="submit" class="btn btn-primary">수정 저장</button>
    </div>
  </form>
</section>
{% endblock %}
