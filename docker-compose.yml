services:
  db:
    image: postgres:16-alpine
    container_name: board_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-boarduser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-boardpass}
      POSTGRES_DB: ${POSTGRES_DB:-boarddb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-boarduser} -d ${POSTGRES_DB:-boarddb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: board_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-boarduser}:${POSTGRES_PASSWORD:-boardpass}@db:5432/${POSTGRES_DB:-boarddb}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

volumes:
  postgres_data:
